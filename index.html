<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PENTASOFT INSTITUTE | Home</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Poppins',sans-serif;
  background: linear-gradient(135deg,#013E8E,#5EC0F6,#E21B79);
  background-size:350% 350%;
  animation:bgMove 10s infinite alternate;
  color:#fff;
}
@keyframes bgMove{
  0%{background-position:0% 50%;}
  100%{background-position:100% 50%;}
}

header{
  backdrop-filter:blur(12px);
  background:rgba(1,62,142,0.35);
  border-bottom:1px solid rgba(255,255,255,0.3);
  padding:18px;text-align:center;
  font-size:28px;font-weight:600;
}

nav{text-align:center;margin:15px 0;}
nav a{
  color:#fff;text-decoration:none;
  margin:0 18px;font-size:18px;
  font-weight:500;transition:.3s;
}
nav a:hover{
  color:#5EC0F6;
  text-shadow:0 0 10px #5EC0F6;
}

.hero{text-align:center;padding:75px 20px;}
.hero h1{
  font-size:45px;font-weight:600;
  text-shadow:0 0 12px #5EC0F6;
  animation:fadeIn 1.3s;
}
.hero p{font-size:20px;margin-top:8px;opacity:.85;animation:fadeIn 2s;}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

.btn{
  display:inline-block;margin-top:25px;
  padding:14px 26px;
  background:#E21B79;
  color:#fff;border-radius:14px;
  font-weight:bold;text-decoration:none;
  transition:.3s;box-shadow:0 0 12px #E21B79;
}
.btn:hover{
  transform:scale(1.06);
  box-shadow:0 0 18px #E21B79;
}

/* SECTION */
.section{padding:50px 0;text-align:center;}
.section h2{font-size:32px;margin-bottom:22px;}

.cards{
  width:80%;margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:25px;
}

/* GLASS NEON CARDS (COLOR LOCKED) */
.card{
  background:rgba(255,255,255,0.15);
  border:1px solid rgba(255,255,255,0.3);
  backdrop-filter:blur(14px);
  padding:30px;border-radius:18px;
  font-size:18px;text-align:center;
  transition:.4s;cursor:pointer;
  box-shadow:0 0 12px rgba(1,62,142,.4);
}
.card:hover{
  transform:translateY(-8px) scale(1.05);
  box-shadow:0 0 22px #5EC0F6,0 0 35px #E21B79;
  color:#fff;
}

footer{
  margin-top:50px;
  text-align:center;padding:13px;
  background:rgba(1,62,142,0.4);
  backdrop-filter:blur(10px);
}
</style>
</head>
<body>

<header>PENTASOFT INSTITUTE</header>

<nav>
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="courses.html">Courses</a>
  <a href="contact.html">Contact</a>
</nav>

<div class="hero">
  <h1>Unlock Your IT Potential</h1>
  <p>Learn Future-Ready Skills with Industry-Standard Training</p>
  <a href="courses.html" class="btn">Explore Courses</a>
</div>

<section class="section">
  <h2>Why Choose Pentasoft?</h2>
  <div class="cards">
    <div class="card">Expert Faculty</div>
    <div class="card">Practical Training</div>
    <div class="card">1000+ Students</div>
    <div class="card">Career-Focused Courses</div>
  </div>
</section>

<footer>© 2026 Pentasoft Institute. All Rights Reserved.</footer>

</body>
</html>
